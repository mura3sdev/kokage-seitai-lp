<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720" role="img" aria-label="木漏れ日の差す施術室で赤ちゃんを抱くお母さんのイメージ">
  <defs>
    <linearGradient id="room" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FBF7F0"/>
      <stop offset="1" stop-color="#F1E9DB"/>
    </linearGradient>
    <radialGradient id="sun" cx="78%" cy="20%" r="60%">
      <stop offset="0" stop-color="#FBE9C8" stop-opacity=".9"/>
      <stop offset="1" stop-color="#FBE9C8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 部屋 -->
  <rect width="1280" height="720" fill="url(#room)"/>
  <rect y="580" width="1280" height="140" fill="#E7DCC9"/>
  <!-- 木漏れ日 -->
  <rect width="1280" height="720" fill="url(#sun)"/>
  <g fill="#D96C47" opacity=".10">
    <circle cx="980" cy="150" r="120"/><circle cx="1120" cy="300" r="80"/><circle cx="860" cy="320" r="56"/>
  </g>

  <!-- 窓 -->
  <g>
    <rect x="900" y="70" width="300" height="330" rx="10" fill="#FFFFFF" stroke="#2F5D46" stroke-width="7"/>
    <path d="M1050 70V400M900 235H1200" stroke="#2F5D46" stroke-width="7"/>
    <rect x="918" y="88" width="114" height="129" fill="#E3EDE6"/>
  </g>

  <!-- 観葉植物 -->
  <g transform="translate(140 360)">
    <path d="M60 220 C40 150 20 110 0 80" fill="none" stroke="#2F5D46" stroke-width="8" stroke-linecap="round"/>
    <g fill="#2F5D46">
      <path d="M60 120 C20 110 -6 70 4 36 C44 44 70 84 60 120Z"/>
      <path d="M70 150 C112 140 140 100 130 64 C90 72 62 114 70 150Z" fill="#5B7D6B"/>
      <path d="M64 180 C30 196 -2 188 -14 156 C22 142 56 150 64 180Z" fill="#5B7D6B"/>
    </g>
    <path d="M16 220 H104 L92 300 H28 Z" fill="#D96C47"/>
  </g>

  <!-- 施術ベッド -->
  <g transform="translate(120 470)">
    <rect x="0" y="40" width="520" height="70" rx="18" fill="#2F5D46"/>
    <rect x="-6" y="20" width="180" height="44" rx="22" fill="#3C6E54"/>
    <rect x="20" y="108" width="22" height="80" fill="#234735"/>
    <rect x="478" y="108" width="22" height="80" fill="#234735"/>
  </g>

  <!-- お母さんと赤ちゃん -->
  <g transform="translate(560 250)">
    <!-- 椅子の気配 -->
    <rect x="-30" y="300" width="320" height="40" rx="16" fill="#E7DCC9"/>
    <!-- 母 体 -->
    <path d="M40 300 C30 200 60 150 130 150 C200 150 230 205 222 300 Z" fill="#D96C47"/>
    <!-- 母 頭 -->
    <circle cx="130" cy="110" r="46" fill="#F0C9A6"/>
    <path d="M86 104 C84 60 176 60 174 104 C174 86 150 70 130 70 C110 70 86 84 86 104Z" fill="#3A2E26"/>
    <!-- 腕（抱っこ） -->
    <path d="M58 220 C90 270 190 270 214 224" fill="none" stroke="#D96C47" stroke-width="34" stroke-linecap="round"/>
    <!-- 赤ちゃん -->
    <g transform="translate(108 226)">
      <ellipse cx="30" cy="30" rx="48" ry="34" fill="#FBF7F0" stroke="#2F5D46" stroke-width="4"/>
      <circle cx="30" cy="24" r="20" fill="#F7D9BC"/>
      <path d="M14 20 C14 4 46 4 46 20 Z" fill="#9A6A48"/>
    </g>
  </g>

  <!-- 葉のあしらい -->
  <g fill="#2F5D46" opacity=".5">
    <path d="M1140 560 c-30 -8 -44 -40 -36 -70 30 8 44 40 36 70z"/>
  </g>
</svg>
